# Public-origin overlay for the Cloudflare Tunnel demo. Single origin: the tunnel
# routes /api → backend and everything else → frontend, so the browser talks to
# the API on the same host (no CORS).
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml -f docker-compose.tunnel.yml up -d
services:
  backend:
    environment:
      AUTOFLOW_CORS_ORIGINS: https://autoflow-research.fosivo.com
      AUTOFLOW_FRONTEND_URL: https://autoflow-research.fosivo.com
  frontend:
    environment:
      NEXT_PUBLIC_API_BASE: https://autoflow-research.fosivo.com
